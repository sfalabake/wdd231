<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Thank You | Lagos Chamber of Commerce</title>

    <meta name="description" content="Membership application confirmation for Lagos Chamber of Commerce.">
    <meta name="author" content="Solomon Oluwadunsin Falabake">

    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">

    <script src="scripts/thankyou.js" defer></script>
</head>

<body>

<header>
    <div class="logo-area">
        <img src="images/coc-logo.png" alt="Lagos Chamber Logo" width="70" height="70">
        <div>
            <h2 class="brand-title">Lagos Chamber of Commerce</h2>
            <p>Empowering Business in Lagos</p>
        </div>
    </div>
</header>

<main class="join-layout">

    <section class="form-section">

        <h1 class="page-title">Thank You for Your Application</h1>

        <p class="thankyou-message">
            Your membership application has been successfully submitted.
        </p>

        <div class="thankyou-card">

            <p><strong>First Name:</strong> <span id="fname"></span></p>
            <p><strong>Last Name:</strong> <span id="lname"></span></p>
            <p><strong>Email:</strong> <span id="email"></span></p>
            <p><strong>Phone:</strong> <span id="phone"></span></p>
            <p><strong>Organization:</strong> <span id="organization"></span></p>
            <p><strong>Membership:</strong> <span id="membership"></span></p>
            <p><strong>Submitted:</strong> <span id="timestamp"></span></p>

        </div>

        <!-- NAVIGATION SECTION -->
        <div class="thankyou-nav">

            <a href="join.html" class="btn-primary">
                Back to Application
            </a>

            <a href="index.html" class="btn-secondary">
                Go to Home
            </a>

        </div>

    </section>

</main>

</body>
</html>
